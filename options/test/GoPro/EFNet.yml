# general settings
name: EFNet_test_psnrssim
model_type: TestImageEventRestorationModel
scale: 1
num_gpu: 1 # set num_gpu: 0 for cpu mode
manual_seed: 10

# dataset and data loader settings
datasets:
  test:
    name: gopro-bestmodel-test
    type: H5ImageDataset

    dataroot: /share401/zhangweiqi/dataset/gopro_scer/test/ # for debug

    # add
    norm_voxel: true
    return_voxel: true
    return_gt_frame: true
    return_mask: true 
    use_mask: true 

    crop_size: ~
    use_flip: false
    use_rot: false
    io_backend:
      type: h5

dataset_name: GoPro

# network structures
network_g:
  type: EFNet
  wf: 64
  fuse_before_downsample: true


# path
path:
  pretrain_network_g: /share401/zhangweiqi/workspace/EFNet/experiments/pretrained_models/EFNet_GoPro.pth
  strict_load_g: true
  resume_state: ~
  root: /share401/zhangweiqi/workspace/EFNet/EFNet_inference/  # set this option ONLY in TEST!!!

# validation settings
val:
  save_img: true
  grids: ~
  crop_size: ~
  rgb2bgr: false # to my h5 data, its false
  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
    ssim:
      type: calculate_ssim
      crop_border: 0

# dist training settings
dist_params:
  backend: nccl
  port: 29500
