# general settings
name: evvit5_scaled_b4g4a2_train # add 'debug' for quick debug
model_type: ImageEventRestorationModel
scale: 1
num_gpu:  4 #4
manual_seed: 10

datasets:
  train:
    name: gopro-h5-train
    type: H5ImageDataset

    # dataroot: ./datasets/GoPro_scer/train
    dataroot: /home/zhangweiqi/dataset/gopro_scer/train/

    # keep true if use events
    norm_voxel: true
    return_voxel: true

    return_mask: false
    use_mask: false

    filename_tmpl: '{}'
    io_backend:
      type: h5

    crop_size: 128
    use_flip: true
    use_rot: true

    # data loader settings
    use_shuffle: true
    num_worker_per_gpu: 0
    batch_size_per_gpu: 4 # 4 for 2080, 8 for titan
    dataset_enlarge_ratio: 2  # accelerate, equals to the num_gpu
    prefetch_mode: cpu
    num_prefetch_queue: 1

  val:
    name: gopro-h5-test
    type: H5ImageDataset

    # dataroot: ./datasets/test
    dataroot: /home/zhangweiqi/dataset/gopro_scer/test/ # for debug

    norm_voxel: true
    return_voxel: true
    return_mask: false
    use_mask: false

    io_backend:
      type: h5

    crop_size: ~
    use_flip: false
    use_rot: false

dataset_name: GoPro

# network structures
network_g:
   type: EventFFTViT5
   evt_inp: 6
   img_inp: 3
   out_channels: 3
   dim: 64                       # 48→64, head_dim aligns to 64 (ViT-5 standard)
   num_blocks: [6, 6, 12]        # [4,4,8]→[6,6,12], 50% deeper each level
   num_refinement_blocks: 4
   num_heads: [1, 2, 4]          # head_dim=64/64/64 at L1/L2/L3
   mlp_ratio: 4.0
   win_size: 8
   drop_path_rate: 0.1           # 0.05→0.1, stronger regularization for larger model
   bias: false
   qk_norm: true
   rope_theta: 10000
   layer_scale: true
   layer_scale_init: !!float 1e-4

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~
  training_states: ~ # save current trainig model states, for resume

# training settings
train:
  optim_g:
    type: AdamW
    lr: !!float 3e-4                # 2e-4→3e-4
    weight_decay: 0.05              # 1e-4→0.05, transformer standard
    betas: [0.9, 0.95]             # 0.99→0.95, faster adaptation

  scheduler:
    type: TrueCosineAnnealingLR
    T_max: 200000
    eta_min: !!float 1e-6           # 1e-7→1e-6, avoid lr floor too low

  total_iter: 400000
  warmup_iter: 10000                # 5000→10000, longer warmup for larger model
  accumulation_steps: 2
  use_grad_clip: false              # disable hardcoded 0.01 clip (too aggressive for transformers)

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean
  fft_loss_opt:
    type: FFTLoss
    loss_weight: 0.1
    reduction: mean

# validation settings
val:
  val_freq: !!float 8e4 # 4e4
  save_img: false
  grids: true
  crop_size: 128
  max_minibatch: 8

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 200
  save_checkpoint_freq: !!float 4e4
  use_tb_logger: true
  wandb:
    project: evNEF_training
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
  timeout: 7200
